name: Java Quality Check

# El robot se activa cada vez que haces un "push" a la rama principal
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargando el código del repositorio
      uses: actions/checkout@v4

    - name: 2. Instalando el entorno Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 3. Compilando el programa (Validación de sintaxis)
      run: javac src/es/jorge/sap/ifct0610/logic/LegalAgeValidator.java

    - name: 4. Ejecutando prueba de salida
      run: java -cp src es.jorge.sap.ifct0610.logic.LegalAgeValidator
